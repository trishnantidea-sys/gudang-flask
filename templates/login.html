<!DOCTYPE html>
<html>
<head>
    <title>Login - Gudang Ekspedisi</title>
</head>
<body>
    <h1>Halaman Login</h1>
    <!-- Menggunakan action dan method POST untuk submit data tanpa JavaScript -->
    <form action="/login" method="POST">
        <div>
            <label>Email:</label><br>
            <input type="email" name="email" required>
        </div>
        <br>
        <div>
            <label>Password:</label><br>
            <input type="password" name="password" required>
        </div>
        <br>
        <button type="submit">Login</button>
    </form>

    <p>Belum punya akun? <a href="/register-page">Daftar di sini</a></p>
</body>
</html>
