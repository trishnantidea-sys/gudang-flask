<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>D&L Express — Register</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0a0a0f;--surface:#12121a;--card:#1a1a26;--border:#2a2a3a;--accent:#f5a623;--accent2:#e84545;--text:#e8e8f0;--muted:#6a6a8a;--green:#2ecc71;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 20px;}
  .box{width:600px;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:40px;}
  .logo{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:3px;color:var(--accent);margin-bottom:4px;}
  .sub{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:32px;}
  .section-title{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;color:var(--muted);margin:24px 0 12px;border-bottom:1px solid var(--border);padding-bottom:8px;}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .form-group{display:flex;flex-direction:column;gap:5px;}
  .form-group.full{grid-column:1/-1;}
  label{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);font-weight:600;}
  input,select{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;transition:border-color .2s;width:100%;}
  input:focus,select:focus{border-color:var(--accent);}
  select option{background:var(--card);}
  .btn-register{width:100%;padding:12px;background:var(--accent);color:#0a0a0f;border:none;border-radius:10px;font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:3px;cursor:pointer;margin-top:24px;transition:all .2s;}
  .btn-register:hover{background:#ffc04d;transform:translateY(-1px);}
  .link{margin-top:16px;font-size:12px;color:var(--muted);text-align:center;}
  .link a{color:var(--accent);text-decoration:none;}
  .flash{padding:10px 16px;border-radius:8px;margin-bottom:16px;font-size:12px;}
  .flash.error{background:rgba(232,69,69,.1);border:1px solid var(--accent2);color:var(--accent2);}
</style>
</head>
<body>
<div class="box">
  <div class="logo">D&L Express</div>
  <div class="sub">Buat Akun Baru</div>
