<!DOCTYPE html>
<html>
<head>
    <title>Edit Paket</title>
</head>
<body>
    <h1>Edit Data Paket</h1>
    <!-- data[0] adalah id paket -->
    <form action="/edit-paket/{{ data[0] }}" method="POST">
        <table border="0">
            <tr>
                <td>Nomor Resi</td>
                <td>: <input type="text" name="resi" value="{{ data[1] }}" required></td>
            </tr>
            <tr>
                <td>Nama Pengirim</td>
                <td>: <input type="text" name="pengirim" value="{{ data[2] }}" required></td>
            </tr>
            <tr>
                <td>No HP Pengirim</td>
                <td>: <input type="text" name="no_hp_pengirim" value="{{ data[3] }}"></td>
            </tr>
            <tr>
                <td>Nama Penerima</td>
                <td>: <input type="text" name="penerima" value="{{ data[4] }}" required></td>
            </tr>
            <tr>
                <td>No HP Penerima</td>
                <td>: <input type="text" name="no_hp_penerima" value="{{ data[5] }}"></td>
            </tr>
            <tr>
                <td>Alamat Tujuan</td>
                <td>: <textarea name="alamat_tujuan" rows="3">{{ data[6] }}</textarea></td>
            </tr>
            <tr>
                <td>Kategori</td>
                <td>: 
                    <select name="kategori">
                        <option value="Alat Olahraga" {% if data[7] == 'Alat Olahraga' %}selected{% endif %}>Alat Olahraga</option>
                        <option value="Kebutuhan Rumah Tangga" {% if data[7] == 'Kebutuhan Rumah Tangga' %}selected{% endif %}>Kebutuhan Rumah Tangga</option>
                        <option value="ATK" {% if data[7] == 'ATK' %}selected{% endif %}>ATK (Alat Tulis Kantor)</option>
                        <option value="Dokumen" {% if data[7] == 'Dokumen' %}selected{% endif %}>Dokumen</option>
                        <option value="Elektronik" {% if data[7] == 'Elektronik' %}selected{% endif %}>Elektronik</option>
                        <option value="Pakaian/Tekstil" {% if data[7] == 'Pakaian/Tekstil' %}selected{% endif %}>Pakaian/Tekstil</option>
                        <option value="Sparepart" {% if data[7] == 'Sparepart' %}selected{% endif %}>Sparepart</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td>Berat (Kg)</td>
                <td>: <input type="number" step="0.1" name="berat" value="{{ data[8] }}"></td>
            </tr>
            <tr>
                <td>Tanggal Kirim</td>
                <td>: <input type="text" name="tanggal_pengiriman" value="{{ data[9] }}"></td>
            </tr>
            <tr>
                <td>Jenis Pengiriman</td>
                <td>: 
                    <input type="radio" name="jenis_pengiriman" value="Reguler" {% if data[10] == 'Reguler' %}checked{% endif %}> Reguler
                    <input type="radio" name="jenis_pengiriman" value="Eco" {% if data[10] == 'Eco' %}checked{% endif %}> Eco
                    <input type="radio" name="jenis_pengiriman" value="Kilat" {% if data[10] == 'Kilat' %}checked{% endif %}> Kilat
                    <input type="radio" name="jenis_pengiriman" value="Kargo" {% if data[10] == 'Kargo' %}checked{% endif %}> Kargo
                </td>
            </tr>
        </table>
        <br>
        <button type="submit">Update Data</button>
        <a href="/paket-page">Batal</a>
    </form>
</body>
</html>
